name: nian_tweet

on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: '推文内容'
        required: true
        default: 'Hello from @nian_bell!'

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Go
        env:
          API_KEY: ${{ secrets.TWITTER_API_KEY }}
          API_SECRET_KEY: ${{ secrets.TWITTER_API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWEET_TEXT: ${{ inputs.tweet_text }}
        run: |
          python3 << 'PYEOF'
import os, json, time, random, hmac, hashlib, base64, urllib.parse

# Build OAuth 1.0a signature manually
def sign(method, url, params, consumer_secret, token_secret):
    # Sort and encode params
    encoded = []
    for k in sorted(params.keys()):
        encoded.append(f"{urllib.parse.quote(str(k), safe='')}={urllib.parse.quote(str(params[k]), safe='')}")
    param_str = '&'.join(encoded)
    
    sig_base = f"{method.upper()}&{urllib.parse.quote(url, safe='')}&{urllib.parse.quote(param_str, safe='')}"
    sig_key = f"{urllib.parse.quote(consumer_secret, safe='')}&{urllib.parse.quote(token_secret, safe='')}"
    
    raw = hmac.new(sig_key.encode(), sig_base.encode(), hashlib.sha1).digest()
    return base64.b64encode(raw).decode()

api_key = os.environ['API_KEY']
api_secret = os.environ['API_SECRET_KEY']
token = os.environ['ACCESS_TOKEN']
token_secret = os.environ['ACCESS_TOKEN_SECRET']
text = os.environ['TWEET_TEXT']

# Build OAuth params
oauth = {
    'oauth_consumer_key': api_key,
    'oauth_nonce': str(random.randint(0, 10**30)),
    'oauth_signature_method': 'HMAC-SHA1',
    'oauth_timestamp': str(int(time.time())),
    'oauth_token': token,
    'oauth_version': '1.0'
}

# For tweet endpoint, include text in params for signature
body = {"text": text}
sig_params = dict(oauth)
sig_params['text'] = text

sig = sign("POST", "https://api.twitter.com/2/tweets", sig_params, api_secret, token_secret)
oauth['oauth_signature'] = sig

# Build header
header = 'OAuth '
parts = []
for k in sorted(oauth.keys()):
    parts.append(f'{k}="{urllib.parse.quote(str(oauth[k]), safe="")}"')
header += ', '.join(parts)

# Make request
import urllib.request
req = urllib.request.Request(
    "https://api.twitter.com/2/tweets",
    data=json.dumps(body).encode(),
    headers={
        "Authorization": header,
        "Content-Type": "application/json"
    },
    method="POST"
)

try:
    resp = urllib.request.urlopen(req)
    result = json.loads(resp.read().decode())
    tid = result['data']['id']
    print(f"OK https://x.com/nian_bell/status/{tid}")
    print(text)
except urllib.error.HTTPError as e:
    body = e.read().decode()
    print(f"FAIL {e.code}")
    print(body)
except Exception as e:
    print(f"ERROR {e}")
PYEOF