name: Tweet

on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: '推文内容'
        required: true
        default: 'Hello from @nian_bell!'

jobs:
  post-tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install requests requests_oauthlib
      - name: Post tweet
        env:
          API_KEY: ${{ secrets.TWITTER_API_KEY }}
          API_SECRET_KEY: ${{ secrets.TWITTER_API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TWEET_TEXT: ${{ inputs.tweet_text }}
        run: python3 -c "
import os, requests, json
from requests_oauthlib import OAuth1
auth = OAuth1(os.environ['API_KEY'], os.environ['API_SECRET_KEY'],
              os.environ['ACCESS_TOKEN'], os.environ['ACCESS_TOKEN_SECRET'])
text = os.environ['TWEET_TEXT']
resp = requests.post('https://api.twitter.com/2/tweets',
    json={'text': text}, auth=auth)
result = resp.json()
if resp.status_code == 201:
    tid = result['data']['id']
    print('OK https://x.com/nian_bell/status/' + tid)
    print(text)
else:
    print('FAIL ' + str(resp.status_code))
    print(json.dumps(result, indent=2))
"