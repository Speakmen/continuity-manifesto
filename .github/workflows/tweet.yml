name: Post Tweet

on:
  workflow_dispatch:
    inputs:
      text:
        description: '推文内容'
        required: true
        type: string

jobs:
  tweet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install tweepy
      - name: Post
        env:
          API_KEY: ${{ secrets.X_API_KEY }}
          API_SECRET: ${{ secrets.X_API_SECRET }}
          ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          ACCESS_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          BEARER: ${{ secrets.X_BEARER_TOKEN }}
          TEXT: ${{ inputs.text }}
        run: python .github/scripts/tweet.py
