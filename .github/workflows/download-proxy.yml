name: Download Proxy Tools v2

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download proxy tools and configs
        run: |
          # Download mihomo (clash.meta)
          echo "Downloading mihomo..."
          curl -sL -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/v1.19.0/mihomo-linux-amd64-v1.19.0.gz" || \
          curl -sL -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64.gz"
          
          if file mihomo.gz | grep -q gzip; then
            gunzip mihomo.gz
          else
            mv mihomo.gz mihomo
          fi
          chmod +x mihomo
          ./mihomo -v || echo "version check failed"
          
          # Download free subscription configs
          curl -sL --connect-timeout 10 -o sub1.txt "https://raw.githubusercontent.com/freefq/free/master/v2" || true
          curl -sL --connect-timeout 10 -o sub2.txt "https://raw.githubusercontent.com/Pawdroid/Free-servers/main/sub" || true
          curl -sL --connect-timeout 10 -o sub3.txt "https://raw.githubusercontent.com/aiboboxx/v2rayfree/main/v2" || true
          curl -sL --connect-timeout 10 -o sub4.txt "https://raw.githubusercontent.com/mahdibland/V2RayAggregator/master/sub/sub_merge.txt" || true
          curl -sL --connect-timeout 10 -o sub5.txt "https://raw.githubusercontent.com/mfuu/v2ray/master/v2ray" || true
          
          # Download new-pac wiki
          curl -sL --connect-timeout 10 "https://raw.githubusercontent.com/wiki/Alvin9999/new-pac/Home.md" > newpac-wiki.md || true
          
          echo "=== Files ==="
          ls -la mihomo sub*.txt newpac-wiki.md 2>/dev/null
          
          for f in sub*.txt; do
            if [ -f "$f" ] && [ -s "$f" ]; then
              echo "=== $f ($(wc -c < "$f") bytes) ==="
              head -3 "$f"
            fi
          done

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: proxy-tools
          path: |
            mihomo
            sub*.txt
            newpac-wiki.md
          if-no-files-found: ignore
