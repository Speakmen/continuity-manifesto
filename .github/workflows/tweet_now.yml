name: tweet_now

on:
  workflow_dispatch:
    inputs:
      tweet_text:
        description: 'text'
        required: true
        default: 'Hello'

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Do
        env:
          KEY: ${{ secrets.TWITTER_API_KEY }}
          SEC: ${{ secrets.TWITTER_API_SECRET }}
          TOK: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TSEC: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          TXT: ${{ inputs.tweet_text }}
        run: python3 tweet.py